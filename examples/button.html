<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>µCSS — Button</title>
	<link rel="stylesheet" href="../dist/mu.css">
</head>
<body>
	<main class="container">
		<hgroup>
			<h1>Button</h1>
			<p>Buttons in 11 colors with ghost, link, and size variants.</p>
		</hgroup>

		<p><a href="index.html">&larr; Back to examples</a></p>
		<p><button class="btn btn-sm btn-secondary" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'">Toggle dark mode</button></p>

		<section>
			<h2>Filled (11 colors)</h2>
			<p>
				<button class="btn btn-primary">Primary</button>
				<button class="btn btn-secondary">Secondary</button>
				<button class="btn btn-tertiary">Tertiary</button>
				<button class="btn btn-contrast">Contrast</button>
			</p>
			<p>
				<button class="btn btn-success">Success</button>
				<button class="btn btn-info">Info</button>
				<button class="btn btn-warning">Warning</button>
				<button class="btn btn-error">Error</button>
			</p>
			<p>
				<button class="btn btn-accent">Accent</button>
				<button class="btn btn-pop">Pop</button>
				<button class="btn btn-spark">Spark</button>
			</p>
		</section>

		<section>
			<h2>Ghost (11 colors)</h2>
			<p>
				<button class="btn btn-ghost btn-primary">Primary</button>
				<button class="btn btn-ghost btn-secondary">Secondary</button>
				<button class="btn btn-ghost btn-tertiary">Tertiary</button>
				<button class="btn btn-ghost btn-contrast">Contrast</button>
			</p>
			<p>
				<button class="btn btn-ghost btn-success">Success</button>
				<button class="btn btn-ghost btn-info">Info</button>
				<button class="btn btn-ghost btn-warning">Warning</button>
				<button class="btn btn-ghost btn-error">Error</button>
			</p>
			<p>
				<button class="btn btn-ghost btn-accent">Accent</button>
				<button class="btn btn-ghost btn-pop">Pop</button>
				<button class="btn btn-ghost btn-spark">Spark</button>
			</p>
		</section>

		<section>
			<h2>Link style</h2>
			<p>
				<button class="btn btn-link">Link button</button>
			</p>
		</section>

		<section>
			<h2>Sizes</h2>
			<p>
				<button class="btn btn-primary btn-sm">Small</button>
				<button class="btn btn-primary">Default</button>
				<button class="btn btn-primary btn-lg">Large</button>
			</p>
		</section>

		<section>
			<h2>As links</h2>
			<p>
				<a class="btn btn-primary" href="#">Link as button</a>
				<a class="btn btn-ghost btn-success" href="#">Ghost link</a>
				<a class="btn btn-error btn-lg" href="#">Large link</a>
			</p>
		</section>
	</main>
</body>
</html>
